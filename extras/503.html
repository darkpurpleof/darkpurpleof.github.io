<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>503 Service Unavailable</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #000000;
      color: #bfbfbf;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 24px;
    }

    .code {
      font-size: 7rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 500;
      margin: 0 0 12px;
    }

    p {
      font-size: 0.95rem;
      line-height: 1.4;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">503</div>
    <h1>Service Unavailable</h1>
    <p>
      The server is busy or under maintenance.
    </p>
  </div>
</body>
</html>
