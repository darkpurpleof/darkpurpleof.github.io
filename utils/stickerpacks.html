<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Create a Sticker Pack</title>

  <!-- Inter (requested) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    /* hard guards: no horizontal scroll & box-sizing */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; width: 100%; overflow-x: hidden; margin: 0; }
    img { max-width: 100%; display: block; }

    :root{
      --bg: #171717;
      --card: #1f1f1f;
      --muted: #a8a8a8;
      --accent: #6b21a8;
      --accent-strong: #5b21b6;
      --text: #eaeaea;
      --border: rgba(255,255,255,0.04);
      --glass: rgba(255,255,255,0.02);
    }
    body.light {
      --bg: #f6f8fb;
      --card: #fff;
      --muted: #475569;
      --text: #0f172a;
      --border: rgba(0,0,0,0.06);
      --glass: rgba(0,0,0,0.02);
    }

    body {
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      transition: background .25s, color .25s;
      min-height: 100vh;
      line-height:1.45;
      padding-bottom:40px;
    }

    /* topbar (sticky) */
    dp-topbar { display:block; position:sticky; top:0; z-index:120; }
    .dp-topbar {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:10px 16px;
      background: linear-gradient(180deg, rgba(0,0,0,0.35), transparent);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid var(--border);
    }
    body.light .dp-topbar { background: linear-gradient(180deg, rgba(255,255,255,0.6), transparent); }

    .brand { display:flex; gap:12px; align-items:center; min-width:0; }
    .logo { width:40px; height:40px; border-radius:10px; background-image: url('/apple-touch-icon.png'); background-size:cover; background-position:center; border:1px solid var(--border); flex-shrink:0; }
    .title { font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:15px; }

    nav { display:flex; gap:10px; align-items:center; margin-left:6px; }
    nav a { color:var(--text); text-decoration:none; font-weight:600; font-size:14px; padding:6px 10px; border-radius:8px; }

    .controls { display:flex; gap:12px; align-items:center; margin-left:auto; }
    .btn-ghost { display:inline-flex; align-items:center; gap:8px; padding:8px 10px; border-radius:10px; background:transparent; border:1px solid var(--border); color:var(--text); cursor:pointer; font-weight:700; }
    #dp-profile-pic { width:40px; height:40px; border-radius:10px; background-image: url('https://darkpurpleof.github.io/org-owner.jpg'); background-size:cover; background-position:center; border:1px solid var(--border); cursor:pointer; }

    main.container {
      max-width:1100px;
      width:100%;
      margin:22px auto;
      padding:18px;
      box-sizing:border-box;
      overflow-x:hidden;
    }

    .card { background: var(--card); border-radius:12px; padding:20px; border:1px solid var(--border); color:var(--text); box-shadow: 0 6px 18px rgba(2,6,23,0.35); }

    h1 { font-size:28px; margin:0 0 8px 0; font-weight:700; }
    .glitch { animation: glitch 1.5s infinite; text-shadow: 0 0 8px rgba(107,33,168,.12); }
    .subtitle { color:var(--muted); font-size:14px; margin-top:6px; }

    .info-chart {
      margin: 12px 0;
      padding: 12px;
      background: linear-gradient(180deg,var(--glass),transparent);
      border-radius:10px;
      border:1px solid var(--border);
      display:block;
      max-width:680px;
    }

    .input-field { width:100%; padding:12px; margin:8px 0; border:1px solid var(--border); border-radius:8px; background:transparent; color:var(--text); box-sizing:border-box; }
    .register-button, .styled-button { padding:12px 16px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--text); cursor:pointer; font-weight:700; }
    .button-container { display:flex; gap:10px; justify-content:center; margin-top:12px; }
    .disabled-button { opacity:0.4; cursor:not-allowed; }

    dialog#imageDialog { background: var(--card); border: 1px solid var(--border); border-radius:14px; width:90%; max-width:420px; padding:1.2rem; color:var(--text); }
    dialog::backdrop { background: rgba(0,0,0,0.6); }

    .error-message { color:#ff7070; margin-top:8px; }
    .success-message { color:var(--accent); margin-top:8px; }

    pre { background: rgba(0,0,0,0.12); padding:10px; border-radius:8px; overflow:auto; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", monospace; font-size:13px; border:1px solid var(--border); color:var(--text); }

    @keyframes glitch {
      0% { transform: none; } 20% { transform: skewX(3deg); } 40% { transform: skewX(-3deg); } 60% { transform: none; } 100% { transform: none; }
    }

    @media (max-width:600px) {
      .dp-topbar { padding:10px 12px; gap:8px; } .title { font-size:14px; max-width:160px; }
    }

  </style>
</head>
<body>
  <!-- topbar -->
  <dp-topbar>
    <header class="dp-topbar" role="banner" aria-label="Top navigation">
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <div class="title">Sticker Pack Creator</div>
      </div>

      <nav aria-label="Top links">
        <a href="/home">Home</a>
        <a href="/utils/stickerpacks.html">Sticker Tool</a>
        <a href="/docs/stickers.html">Sticker Docs</a>
      </nav>

      <div class="controls" role="toolbar" aria-label="Topbar controls">
        <button class="btn-ghost" onclick="document.body.classList.toggle('light')" id="theme-icon" aria-label="Toggle theme">🌙</button>
        <div id="dp-profile-pic" aria-label="Profile" role="img"></div>
      </div>
    </header>
  </dp-topbar>

  <main class="container" role="main">
    <article class="card" aria-labelledby="title">
      <h1 id="title" class="glitch">Create a sticker pack</h1>
      <div class="subtitle">This ultra-forgotten tool still works — export .dpfstickers files for distribution or store upload.</div>

      <div class="info-chart">
        <input class="input-field" id="packId" placeholder="Pack ID">
        <input class="input-field" id="packName" placeholder="Pack Name">
        <input class="input-field" id="packAuthor" placeholder="Pack Author">
        <textarea class="input-field" id="packDescription" placeholder="Description (max 500 chars)" maxlength="500"></textarea>
      </div>

      <div id="stickersContainer" class="info-chart" style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center;"></div>
      <p id="errorMessage" class="error-message"></p>

      <div class="button-container">
        <button class="register-button disabled-button" id="exportBtn" disabled>Export to Sticker Pack</button>
        <label class="styled-button" for="importFile">Import from Pack</label>
        <input type="file" id="importFile" accept=".dpfstickers" style="display:none" />
      </div>

      <dialog id="imageDialog">
        <form method="dialog">
          <p>Enter image URL:</p>
          <input id="imgUrlInput" type="url" placeholder="https://example.com/image.png" required class="input-field" />
          <div style="margin-top:10px; display:flex; gap:8px;">
            <button class="register-button" id="confirmAddImage">Add Image</button>
            <button class="register-button" type="button" onclick="document.getElementById('imageDialog').close()">Cancel</button>
          </div>
        </form>
      </dialog>
    </article>
  </main>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCAPZF2zwU6z5rhikrIVZ4TVxf1tS5aTbA",
      authDomain: "darkpurpleof-s-website.firebaseapp.com",
      databaseURL: "https://darkpurpleof-s-website-default-rtdb.firebaseio.com",
      projectId: "darkpurpleof-s-website",
      storageBucket: "darkpurpleof-s-website.firebasestorage.app",
      messagingSenderId: "520651082420",
      appId: "1:520651082420:web:bb05c0c3fd64517952e5e1",
      measurementId: "G-S2X2JYC8Z0"
    };

    // initialize firebase compat
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const maxStickers = 50;
    const stickers = [];
    let currentEditingIndex = null;

    const stickersContainer = document.getElementById('stickersContainer');
    const exportBtn = document.getElementById('exportBtn');
    const errorMessage = document.getElementById('errorMessage');
    const imgDialog = document.getElementById('imageDialog');
    const imgUrlInput = document.getElementById('imgUrlInput');
    const importFile = document.getElementById('importFile');

    function createAddCard() {
      const card = document.createElement('div');
      card.className = 'info-chart';
      card.style.width = '120px';
      card.style.height = '120px';
      card.style.display = 'flex';
      card.style.flexDirection = 'column';
      card.style.justifyContent = 'center';
      card.style.alignItems = 'center';
      card.style.cursor = 'pointer';
      card.innerHTML = '<span style="font-size: 40px">+</span>';
      card.onclick = () => {
        currentEditingIndex = null;
        imgUrlInput.value = '';
        imgDialog.showModal();
      };
      stickersContainer.appendChild(card);
    }

    function renderStickers() {
      stickersContainer.innerHTML = '';
      let hasSizeWarning = false;

      stickers.forEach((sticker, index) => {
        const card = document.createElement('div');
        card.className = 'info-chart';
        card.style.width = '255px';
        card.style.padding = '10px';
        card.style.position = 'relative';
        card.style.boxSizing = 'border-box';
        card.style.display = 'flex';
        card.style.flexDirection = 'column';
        card.style.alignItems = 'center';
        card.style.gap = '8px';

        const imgElement = document.createElement('img');
        imgElement.src = sticker.url;
        imgElement.style.maxHeight = '255px';
        imgElement.style.maxWidth = '100%';
        imgElement.style.objectFit = 'contain';
        imgElement.style.cursor = 'pointer';
        imgElement.onclick = () => {
          currentEditingIndex = index;
          imgUrlInput.value = sticker.url;
          imgDialog.showModal();
        };

        const dimFeedback = document.createElement('div');
        dimFeedback.style.fontSize = '0.9em';
        dimFeedback.style.textAlign = 'center';

        const imageCheck = new Image();
        imageCheck.onload = () => {
          const { width, height } = imageCheck;
          if (width > 255 || height > 255) {
            dimFeedback.textContent = `❗ Too big (${width}x${height})`;
            dimFeedback.style.color = 'red';
            hasSizeWarning = true;
          } else if (width < 200 || height < 200) {
            dimFeedback.textContent = `⚠️ Too small (${width}x${height})`;
            dimFeedback.style.color = 'orange';
            hasSizeWarning = true;
          } else {
            dimFeedback.textContent = `☑️ ${width}x${height}`;
            dimFeedback.style.color = 'purple';
          }
        };
        imageCheck.onerror = () => {
          dimFeedback.textContent = `❌ Could not load`;
          dimFeedback.style.color = 'red';
        };
        imageCheck.src = sticker.url;

        const idInput = document.createElement('input');
        idInput.placeholder = 'ID';
        idInput.className = 'input-field';
        idInput.style.width = '100%';
        idInput.value = sticker.id || '';
        idInput.onchange = (e) => updateSticker(index, 'id', e.target.value);
        idInput.onclick = (e) => e.stopPropagation();

        const nameInput = document.createElement('input');
        nameInput.placeholder = 'Name';
        nameInput.className = 'input-field';
        nameInput.style.width = '100%';
        nameInput.value = sticker.name || '';
        nameInput.onchange = (e) => updateSticker(index, 'name', e.target.value);
        nameInput.onclick = (e) => e.stopPropagation();

        const errorMsg = document.createElement('p');
        errorMsg.className = 'error-message';
        errorMsg.id = `error-${index}`;

        const deleteBtn = document.createElement('img');
        deleteBtn.src = '/assets/delete.png';
        deleteBtn.alt = 'Delete';
        deleteBtn.style.position = 'absolute';
        deleteBtn.style.top = '6px';
        deleteBtn.style.right = '6px';
        deleteBtn.style.width = '20px';
        deleteBtn.style.height = '20px';
        deleteBtn.style.cursor = 'pointer';
        deleteBtn.onclick = (e) => {
          e.stopPropagation();
          stickers.splice(index, 1);
          renderStickers();
        };

        card.appendChild(imgElement);
        card.appendChild(dimFeedback);
        card.appendChild(idInput);
        card.appendChild(nameInput);
        card.appendChild(errorMsg);
        card.appendChild(deleteBtn);
        stickersContainer.appendChild(card);
      });

      if (hasSizeWarning) {
        const disclaimer = document.createElement('p');
        disclaimer.textContent = '⚠️ In the app, stickers display fixed size. Too small or large images may fail, be cropped, or not show.';
        disclaimer.style.color = 'yellow';
        disclaimer.style.fontSize = '1em';
        disclaimer.style.marginTop = '10px';
        disclaimer.style.textAlign = 'center';
        stickersContainer.appendChild(disclaimer);
      }

      if (stickers.length < maxStickers) createAddCard();
      validateExportReady();
    }

    function updateSticker(index, field, value) {
      stickers[index][field] = value;
      validateExportReady();
    }

    importFile.onchange = (event) => {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          if (!data.packId || !data.name || !data.author || !data.stickers) {
            errorMessage.textContent = 'Invalid file format';
            return;
          }
          document.getElementById('packId').value = data.packId;
          document.getElementById('packName').value = data.name;
          document.getElementById('packAuthor').value = data.author;
          document.getElementById('packDescription').value = data.description || '';
          stickers.length = 0;
          stickers.push(...data.stickers.map(s => ({ id: s.id, name: s.name, url: s.resource })));
          document.getElementById('packId').disabled = true;
          document.getElementById('packName').disabled = true;
          document.getElementById('packAuthor').disabled = true;
          renderStickers();
          errorMessage.textContent = '';
        } catch (err) {
          errorMessage.textContent = 'Error reading file';
        }
      };
      reader.readAsText(file);
    };

    document.getElementById('confirmAddImage').onclick = (e) => {
      e.preventDefault();
      const url = imgUrlInput.value;
      if (!url.startsWith('https://')) {
        errorMessage.textContent = 'URL must start with https://';
        return;
      }
      const img = new Image();
      img.onload = () => {
        if (img.width > 250 || img.height > 250) {
          errorMessage.textContent = 'Image too big: must be 250x250 or smaller';
        } else {
          errorMessage.textContent = '';
          if (currentEditingIndex !== null) {
            stickers[currentEditingIndex].url = url;
          } else {
            stickers.push({ url, id: '', name: '' });
          }
          renderStickers();
        }
        imgDialog.close();
      };
      img.onerror = () => {
        errorMessage.textContent = 'Invalid image URL or not an image';
        imgDialog.close();
      };
      img.src = url;
    };

    function validateExportReady() {
      let valid = true;
      const ids = new Set();
      stickers.forEach((sticker, index) => {
        const idField = document.querySelector(`#error-${index}`);
        if (!sticker.id || ids.has(sticker.id)) {
          idField.textContent = !sticker.id ? 'Missing ID' : 'Duplicate ID';
          valid = false;
        } else {
          idField.textContent = '';
          ids.add(sticker.id);
        }
      });
      const ready = valid && stickers.length >= 2;
      exportBtn.disabled = !ready;
      exportBtn.classList.toggle('disabled-button', !ready);
    }

    exportBtn.onclick = () => {
      const packId = document.getElementById('packId').value;
      const packName = document.getElementById('packName').value;
      const packAuthor = document.getElementById('packAuthor').value;
      const packDescription = document.getElementById('packDescription').value;
      const date = new Date().toISOString();
      const data = {
        packId,
        name: packName,
        description: packDescription,
        author: packAuthor,
        date,
        stickers: stickers.map(s => ({ id: s.id, name: s.name, resource: s.url }))
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `${packId}.dpfstickers`;
      link.click();
    };

    // initial render
    renderStickers();
  </script>

  <script type="module" src="/dp-topbar.js"></script>
</body>
</html>
