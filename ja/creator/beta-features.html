<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ベータプログラム</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap)" rel="stylesheet">

  <!-- Firebase (non-modular) - LOAD THESE AT THE TOP as requested -->
  <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore-compat.js"></script>

  <!-- Initialize Firebase immediately so other scripts (like dp-topbar) can use firebase -->
  <script>
    // Replace with your project's Firebase config if different
    var firebaseConfig = {
      apiKey: "AIzaSyCAPZF2zwU6z5rhikrIVZ4TVxf1tS5aTbA",
      authDomain: "darkpurpleof-s-website.firebaseapp.com",
      projectId: "darkpurpleof-s-website",
      storageBucket: "darkpurpleof-s-website.firebasestorage.app",
      messagingSenderId: "520651082420",
      appId: "1:520651082420:web:bb05c0c3fd64517952e5e1"
    };
    // Only initialize once (guard just in case)
    try {
      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }
    } catch (e) {
      console.error('Firebase init error', e);
    }
  </script>

  <!-- Your existing topbar script (non-module) - keep external as requested -->
  <script src="/dp-topbar.js"></script>

  <style>
    /* --- user-provided theme (kept intact, with tiny additions for the modal & topbar) --- */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; width: 100%; overflow-x: hidden; }
    img { max-width: 100%; display: block; }

    :root{
      --bg: #171717;
      --card: #1f1f1f;
      --muted: #a8a8a8;
      --accent: #6b21a8;
      --accent-strong: #5b21b6;
      --text: #eaeaea;
      --border: rgba(255,255,255,0.04);
      --friend-row-height: 110px;
      --friend-row-height-mobile: 84px;
    }
    body.light { --bg: #f6f8fb; --card:#fff; --muted:#475569; --text:#0f172a; --border: rgba(0,0,0,0.06); }

    body {
      margin:0;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
      background-color: var(--bg);
      color:var(--text);
      transition: background .25s, color .25s;
      min-height:100vh;
    }

    dp-topbar { display:block; position:sticky; top:0; z-index:100; }
    .top-bar { display:none !important; }

    main.container {
      max-width:1200px;
      width:100%;
      margin:24px auto;
      padding:20px;
      display:grid;
      grid-template-columns:1fr 340px;
      gap:20px;
      box-sizing:border-box;
      overflow-x: hidden;
    }
    @media (max-width:920px){ main.container{ grid-template-columns:1fr; padding:16px; } aside.right-column{ order:2; } }

    .card { background:var(--card); border-radius:12px; padding:18px; border:1px solid var(--border); color:var(--text); box-shadow:0 6px 18px rgba(2,6,23,0.45); overflow:visible; }
    .hero { display: flex; gap: 16px; align-items: center; justify-content: space-between; padding: 20px; border-radius: 12px; min-width: 0; }
    .hero > div { min-width: 0; }

    .muted { color:var(--muted); font-size:13px; }

    .center-card { max-width:900px; margin: 0 auto; }
    .beta-card { display:flex; gap:18px; align-items:flex-start; }
    @media (max-width:720px) { .beta-card { flex-direction:column; align-items:center; text-align:center; } }

    .beta-art {
      width:320px; height:320px; border-radius:12px; background-size:cover; background-position:center; flex-shrink:0; border:1px solid var(--border);
    }
    @media (max-width:720px){ .beta-art{ width:100%; height:220px; } }

    .beta-body { flex:1; min-width:0; display:flex; flex-direction:column; gap:12px; }
    .beta-title { font-size:20px; font-weight:800; }
    .beta-desc { color:var(--muted); font-size:15px; line-height:1.4; white-space:pre-wrap; }

    .actions { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    .btn { padding:10px 14px; border-radius:10px; border:1px solid var(--border); background:transparent; cursor:pointer; font-weight:700; color:var(--text); }
    .btn.primary { background: linear-gradient(180deg,var(--accent), var(--accent-strong)); border: none; color: white; }
    .btn.ghost { background: transparent; }

    #toast { position:fixed; top:18px; left:50%; transform:translateX(-50%); padding:10px 14px; border-radius:10px; font-weight:700; display:none; z-index:99999; }
    #toast.purple { background:var(--accent-strong); color:#fff; } #toast.yellow{ background:#e6b800; color:#222; } #toast.red{ background:#c00; color:#fff; }

    /* modal */
    .modal-backdrop{ position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center; z-index:9998; }
    .modal { background:var(--card); border-radius:12px; padding:18px; width:420px; max-width:95%; border:1px solid var(--border); }
    .modal h3{ margin:0 0 8px 0; }
    .modal .modal-actions{ display:flex; gap:8px; justify-content:flex-end; margin-top:12px; }

    /* topbar styling (minimal) */
    dp-topbar .bar{ display:flex; gap:16px; align-items:center; padding:10px 20px; background:linear-gradient(90deg, rgba(0,0,0,0.2), transparent); border-bottom:1px solid var(--border); }
    dp-topbar .logo{ display:flex; align-items:center; gap:10px; font-weight:800; }
    dp-topbar .logo .dot{ width:12px; height:12px; border-radius:4px; background:var(--accent); box-shadow:0 2px 8px rgba(107,33,168,0.35); }
    dp-topbar nav{ margin-left:auto; display:flex; gap:10px; }
    dp-topbar a{ color:var(--muted); text-decoration:none; font-weight:600; padding:8px 10px; border-radius:8px; }
    dp-topbar a.active{ color:var(--text); }

    /* small responsive tweaks */
    @media (max-width:600px){ main.container{ padding:12px; margin:12px auto; } }
  </style>
</head>
<body>

  <!-- Use your existing topbar implementation (external script provided above) -->
  <dp-topbar></dp-topbar>

  <main class="container">
    <section class="center-card card">
      <div class="hero">
        <div style="flex:1;">
          <div class="beta-card" id="betaCard">
            <div class="beta-art" id="betaArt" style="background-image: url('./assets/beta_en_unavailable.png')"></div>
            <div class="beta-body">
              <div class="beta-title">DarkPurpleOF's Website ベータプログラム</div>
              <div class="beta-desc" id="betaDesc">適格性を確認中...</div>
              <div class="actions" id="betaActions" style="margin-top:8px"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <aside class="right-column card">
      <h3>ベータプログラムの情報</h3>
      <p class="muted">ベータ版に参加すると、実験的な機能をいち早く利用できます。登録料は 1000 DF$ です（返金不可）。</p>
      <p class="muted">参加すると、ベータ体験用の公式プラグインをダウンロードできます。</p>
    </aside>
  </main>

  <!-- Confirm modal -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" role="dialog" aria-modal="true">
      <h3 id="modalTitle">確認</h3>
      <div id="modalBody">本当によろしいですか？</div>
      <div class="modal-actions">
        <button class="btn" id="modalCancel">キャンセル</button>
        <button class="btn primary" id="modalConfirm">はい</button>
      </div>
    </div>
  </div>

  <div id="toast" class="purple"></div>

  <!-- App logic (NON-modular, uses firebase global from the scripts loaded in <head>) -->
  <script>
    // Use global firebase (already initialized in <head>)
    var auth = firebase.auth();
    var db = firebase.firestore();

    // helpers
    var toastEl = document.getElementById('toast');
    function toast(text, kind){ kind = kind || 'purple'; toastEl.textContent = text; toastEl.className = kind; toastEl.style.display = 'block'; setTimeout(function(){ toastEl.style.display = 'none'; }, 3000); }

    var modalBackdrop = document.getElementById('modalBackdrop');
    var modalTitle = document.getElementById('modalTitle');
    var modalBody = document.getElementById('modalBody');
    var modalCancel = document.getElementById('modalCancel');
    var modalConfirm = document.getElementById('modalConfirm');
    function askConfirmation(title, body){
      return new Promise(function(resolve){
        modalTitle.textContent = title; modalBody.textContent = body;
        modalBackdrop.style.display = 'flex';
        function cancel(){ modalBackdrop.style.display='none'; cleanup(); resolve(false); }
        function confirm(){ modalBackdrop.style.display='none'; cleanup(); resolve(true); }
        function cleanup(){ modalCancel.removeEventListener('click', cancel); modalConfirm.removeEventListener('click', confirm); }
        modalCancel.addEventListener('click', cancel);
        modalConfirm.addEventListener('click', confirm);
      });
    }

    function parseCoins(coinsStr) {
      return BigInt(coinsStr || '0');
    }

    var betaArt = document.getElementById('betaArt');
    var betaDesc = document.getElementById('betaDesc');
    var betaActions = document.getElementById('betaActions');

    var ASSETS = {
      available: '/org-owner.jpg',
      unavailable: '/assets/beta_en_unavailable.png',
      enrolled: '/assets/default_inverted.png'
    };

    var currentUser = null;

    function accountOlderThanSixMonths(creationTimeISO){
      if(!creationTimeISO) return false;
      var created = new Date(creationTimeISO);
      var sixMonths = new Date(created);
      sixMonths.setMonth(sixMonths.getMonth() + 6);
      return (new Date()) >= sixMonths;
    }

    function renderUnavailable(missingDetails){
      betaArt.style.backgroundImage = "url('"+ASSETS.unavailable+"')";
      betaDesc.textContent = `あなたはベータプログラムに参加できません。次の条件をすべて満たす必要があります:
- アカウント作成から 6 か月以上経過していること
- 1000 DF$ 以上を所持していること
- ログインしていること

現在、満たしていない条件: ${missingDetails}`;
      betaActions.innerHTML = '';
    }

    function renderNotEnrolled(){
      betaArt.style.backgroundImage = "url('"+ASSETS.available+"')";
      betaDesc.textContent = "ベータプログラムに参加して、誰よりも早く新しい機能を使いましょう。ベータプログラムに参加すると、利用規約に同意したものとみなされます。利用規約は [darkpurpleof.github.io](https://darkpurpleof.github.io/terms) で確認できます。また、参加時に 1000 DF$ の登録料（返金不可）が発生します。この 1000 DF$ は、途中で退会しても返金されません。";
      betaActions.innerHTML = '';
      var enrollBtn = document.createElement('button'); enrollBtn.className = 'btn primary'; enrollBtn.textContent = '参加する';
      enrollBtn.addEventListener('click', onEnrollClicked);
      betaActions.appendChild(enrollBtn);
    }

    function renderEnrolled(){
      betaArt.style.backgroundImage = "url('"+ASSETS.enrolled+"')";
      betaDesc.textContent = "あなたは現在ベータプログラムに参加しています。今後、ベータ機能が提供される予定です。今のうちに、ベータプログラムの公式プラグインをダウンロードして、公式アプリの利用を始めることもできます。";
      betaActions.innerHTML = '';
      var downloadBtn = document.createElement('a'); downloadBtn.className = 'btn primary';
      downloadBtn.href = '../ugc/viewugc?id=beta-enroll&author=system@darkpurpleof.github.io&type=1';
      downloadBtn.textContent = 'プラグインをダウンロード';
      var withdrawBtn = document.createElement('button'); withdrawBtn.className='btn'; withdrawBtn.textContent='参加をキャンセル';
      withdrawBtn.addEventListener('click', onWithdrawClicked);
      betaActions.appendChild(downloadBtn); betaActions.appendChild(withdrawBtn);
    }

    // Actions
    function onEnrollClicked(){
      if(!currentUser){ toast('参加するにはログインが必要です', 'red'); return; }
      askConfirmation('ベータプログラムに参加', '1000 DF$ を支払ってベータプログラムに参加しますか？この料金は返金不可です。参加すると、[darkpurpleof.github.io](https://darkpurpleof.github.io/terms) で確認できる利用規約に同意し、実験的な機能を先行利用できるようになります。後から退会することはできますが、料金は返金されません。').then(function(confirmed){
        if(!confirmed) return;
        var userEmail = currentUser.email;
        var userRef = db.collection('user_data').doc(userEmail);

        db.runTransaction(function(transaction){
          return transaction.get(userRef).then(function(uSnap){
            if(!uSnap.exists){ throw new Error('ユーザーデータが見つかりません'); }
            var data = uSnap.data() || {};
            var coinsStr = (data.coins || '0').toString();
            var coins = parseCoins(coinsStr);
            if(coins < 1000n){ throw new Error('コインが不足しています'); }
            var newCoins = coins - 1000n;
            transaction.update(userRef, { coins: newCoins.toString(), beta_enrolled: true });

            var trRefEnroll = db.collection('transactions').doc(userEmail).collection('records').doc('beta-enroll');
            transaction.set(trRefEnroll, {
              amount: 1000,
              date: firebase.firestore.FieldValue.serverTimestamp(),
              description: 'ベータ参加',
              image: 'darkpurpleof.github.io/org-owner.jpg',
              source: 'system@darkpurpleof.github.io',
              type: 'outgoing'
            });

            var trRefFixer = db.collection('transactions').doc(userEmail).collection('records').doc('darkpurpleofswebsitefixer');
            transaction.set(trRefFixer, {
              amount: 0,
              date: firebase.firestore.FieldValue.serverTimestamp(),
              description: "DarkPurpleOF's Website Beta",
              image: 'darkpurpleof.github.io/assets/default_inverted.png',
              source: 'system@darkpurpleof.github.io',
              type: 'outgoing'
            });

          });
        }).then(function(){
          toast('参加に成功しました！', 'purple'); refreshUI();
        }).catch(function(err){ console.error(err); toast(err.message || '参加エラー', 'red'); });

      });
    }

    function onWithdrawClicked(){
      if(!currentUser){ toast('ログインが必要です', 'red'); return; }
      askConfirmation('ベータプログラムから退会', 'ベータプログラムから退会しますか？この操作は元に戻せません。beta_enrolled の状態は削除され、関連する取引記録も削除され、ベータ機能へのアクセスを失います。参加時の 1000 DF$ は返金されません。').then(function(confirmed){
        if(!confirmed) return;
        var userRef = db.collection('user_data').doc(currentUser.email);
        var trRefFixer = db.collection('transactions').doc(currentUser.email).collection('records').doc('darkpurpleofswebsitefixer');
        var trRefEnroll = db.collection('transactions').doc(currentUser.email).collection('records').doc('beta-enroll');

        userRef.update({ beta_enrolled: firebase.firestore.FieldValue.delete() }).then(function(){
          trRefFixer.delete().catch(function(e){ console.warn('fixer削除エラー', e); });
          trRefEnroll.delete().catch(function(e){ console.warn('enroll削除エラー', e); });
          toast('ベータプログラムから退会しました', 'yellow'); refreshUI();
        }).catch(function(err){ console.error(err); toast(err.message || '退会エラー', 'red'); });
      });
    }

    // refresh UI
    function refreshUI(){
      if(!currentUser){ renderUnavailable('ログイン'); return; }
      var userRef = db.collection('user_data').doc(currentUser.email);
      userRef.get().then(function(snap){
        var data = snap.exists ? snap.data() : {};
        var isEnrolled = !!data.beta_enrolled;
        var coinsStr = (data.coins || '0').toString();
        var coins = parseCoins(coinsStr);
        var creationTime = currentUser.metadata && currentUser.metadata.creationTime;
        var meetsAge = accountOlderThanSixMonths(creationTime);
        var meetsCoins = coins >= 1000n;
        if(isEnrolled){ renderEnrolled(); return; }
        var missingDetails = [];
        if(!meetsAge) missingDetails.push('アカウントの経過期間（6か月以上必要）');
        if(!meetsCoins) {
          var needed = 1000n - coins;
          missingDetails.push(`コイン（現在 ${coins.toString()} DF$、あと ${needed.toString()} DF$ 必要）`);
        }
        if(!currentUser) missingDetails.push('ログイン');
        if(missingDetails.length > 0){
          renderUnavailable(missingDetails.join(', '));
        } else {
          renderNotEnrolled();
        }
      }).catch(function(err){ console.error(err); toast('ユーザーデータの読み込みに失敗しました', 'red'); });
    }

    // auth listener
    auth.onAuthStateChanged(function(user){ currentUser = user; refreshUI(); });

    document.addEventListener('DOMContentLoaded', function(){ refreshUI(); });
  </script>
</body>
</html>
