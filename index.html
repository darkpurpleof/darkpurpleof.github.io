<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Redirecting...</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-auth-compat.js"></script>

  <style>
    body { display: none; } /* Hide everything */
  </style>
</head>

<body>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCAPZF2zwU6z5rhikrIVZ4TVxf1tS5aTbA",
      authDomain: "darkpurpleof-s-website.firebaseapp.com",
      databaseURL: "https://darkpurpleof-s-website-default-rtdb.firebaseio.com",
      projectId: "darkpurpleof-s-website",
      storageBucket: "darkpurpleof-s-website.firebasestorage.app",
      messagingSenderId: "520651082420",
      appId: "1:520651082420:web:bb05c0c3fd64517952e5e1",
      measurementId: "G-S2X2JYC8Z0"
    };

    if (!window.firebase || !firebase.apps.length) firebase.initializeApp(firebaseConfig);

    const db = firebase.firestore();
    const auth = firebase.auth();

    const supportedLangs = ['ja', 'ru', 'es', 'en', 'de'];

    function getBrowserLang() {
      const lang = navigator.language || 'en';
      const code = lang.split('-')[0].toLowerCase();
      return supportedLangs.includes(code) ? code : 'en';
    }

    function redirect(lang) {
      const path = lang === 'en' ? '/home' : `/${lang}/`;
      window.location.href = path;
    }

    auth.onAuthStateChanged(async user => {
      if (!user) {
        // Not logged in, use browser lang, set to 'en' if not supported
        const lang = getBrowserLang();
        redirect(lang);
        return;
      }

      try {
        const docRef = db.collection('user_data').doc(user.email);
        const docSnap = await docRef.get();

        let lang = 'en'; // default

        if (docSnap.exists) {
          const data = docSnap.data() || {};
          lang = data.lang || null;
        }

        if (!lang) {
          // No lang in DB, check browser
          lang = getBrowserLang();
          // Set in DB
          await docRef.set({ lang }, { merge: true });
        }

        redirect(lang);
      } catch (e) {
        console.warn('Lang detection failed', e);
        redirect('en');
      }
    });
  </script>
</body>
</html>
